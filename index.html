<!DOCTYPE html>
<!-- UCN · Dashboard Colaboradores | v1 | 2026-04-13 -->
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UCN · Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=Carlito:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --navy:  #003366;
  --blue:  #0066CC;
  --red:   #FF3333;
  --white: #FFFFFF;
  --bg:    #F4F7FC;
  --surface: #FFFFFF;
  --border: #E2E8F0;
  --text:   #1E293B;
  --muted:  #64748B;
  --success: #10B981;
  --radius: 12px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: 'Carlito', sans-serif; min-height: 100vh; }

/* ── HEADER ── */
.header {
  background: var(--navy);
  padding: 14px 32px;
  display: flex; align-items: center; justify-content: space-between;
  box-shadow: 0 2px 12px rgba(0,51,102,0.3);
}
.header img { height: 44px; }
.header-title { color: rgba(255,255,255,0.7); font-size: 12px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; text-align: right; }
.header-title strong { display: block; color: #fff; font-size: 16px; font-family: 'DM Sans', sans-serif; letter-spacing: -0.01em; }
.accent { height: 4px; background: linear-gradient(90deg, var(--red), var(--blue), var(--navy)); }

/* ── TABS ── */
.tabs-wrap { background: var(--white); border-bottom: 1px solid var(--border); padding: 0 24px; display: flex; gap: 0; overflow-x: auto; }
.tab-btn {
  background: none; border: none; cursor: pointer;
  padding: 14px 22px; font-size: 13px; font-weight: 600; font-family: 'DM Sans', sans-serif;
  color: var(--muted); border-bottom: 3px solid transparent; white-space: nowrap;
  transition: color .2s, border-color .2s;
}
.tab-btn:hover { color: var(--navy); }
.tab-btn.active { color: var(--navy); border-bottom-color: var(--blue); }

/* ── MAIN ── */
.main { max-width: 1100px; margin: 0 auto; padding: 28px 24px 48px; }
.tab-panel { display: none; }
.tab-panel.active { display: block; }

/* ── SEARCH BOX ── */
.search-wrap { position: relative; margin-bottom: 20px; }
.search-wrap svg { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--muted); }
.search-input {
  width: 100%; padding: 12px 16px 12px 42px;
  border: 1px solid var(--border); border-radius: var(--radius);
  font-size: 14px; font-family: 'Carlito', sans-serif;
  background: var(--white); color: var(--text);
  outline: none; transition: border-color .2s, box-shadow .2s;
}
.search-input:focus { border-color: var(--blue); box-shadow: 0 0 0 3px rgba(0,102,204,0.12); }
.search-input::placeholder { color: var(--muted); }

/* ── RESULT CARD ── */
.result-card {
  background: var(--white); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 20px 22px; margin-bottom: 10px;
  display: flex; align-items: center; gap: 20px;
  transition: box-shadow .2s, border-color .2s;
  animation: fadeIn .25s ease;
}
.result-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.08); border-color: rgba(0,102,204,0.25); }
@keyframes fadeIn { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:none; } }

.score-circle {
  width: 64px; height: 64px; border-radius: 50%; flex-shrink: 0;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  font-family: 'DM Sans', sans-serif; font-weight: 800;
}
.score-circle.pass { background: rgba(16,185,129,0.1); border: 2px solid rgba(16,185,129,0.4); color: #059669; }
.score-circle.fail { background: rgba(255,51,51,0.08); border: 2px solid rgba(255,51,51,0.3); color: var(--red); }
.score-pct  { font-size: 15px; line-height: 1; }
.score-pts  { font-size: 9px; opacity: .7; margin-top: 2px; }

.result-info { flex: 1; min-width: 0; }
.result-name { font-size: 15px; font-weight: 700; font-family: 'DM Sans', sans-serif; color: var(--navy); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.result-meta { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 6px; }
.chip {
  font-size: 10px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase;
  padding: 3px 9px; border-radius: 100px;
}
.chip-rol  { background: rgba(0,51,102,0.08); color: var(--navy); }
.chip-suc  { background: rgba(0,102,204,0.1); color: var(--blue); }
.chip-turn-a { background: rgba(0,102,204,0.1); color: var(--blue); }
.chip-turn-b { background: rgba(255,51,51,0.08); color: var(--red); }
.chip-turn-na { background: #F1F5F9; color: var(--muted); }
.chip-pass { background: rgba(16,185,129,0.1); color: #059669; }
.chip-fail { background: rgba(255,51,51,0.08); color: var(--red); }

.prog-bar-wrap { margin-top: 10px; height: 6px; background: #EEF2F7; border-radius: 3px; overflow: hidden; }
.prog-bar { height: 100%; border-radius: 3px; transition: width 0.8s cubic-bezier(.2,.8,.2,1); }
.prog-bar.pass { background: linear-gradient(90deg, #059669, #10B981); }
.prog-bar.fail { background: linear-gradient(90deg, #CC0000, var(--red)); }

.empty-state { text-align: center; padding: 48px 24px; color: var(--muted); }
.empty-state svg { margin-bottom: 12px; opacity: .4; }
.empty-state p { font-size: 14px; }

/* ── KPI CARDS ── */
.kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; margin-bottom: 28px; }
.kpi-card {
  background: var(--white); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 18px 20px; border-top: 3px solid var(--blue);
}
.kpi-card.red  { border-top-color: var(--red); }
.kpi-card.navy { border-top-color: var(--navy); }
.kpi-card.green{ border-top-color: var(--success); }
.kpi-label { font-size: 10px; font-weight: 700; letter-spacing: .14em; text-transform: uppercase; color: var(--muted); margin-bottom: 6px; }
.kpi-value { font-size: 32px; font-weight: 900; font-family: 'DM Sans', sans-serif; letter-spacing: -.03em; line-height: 1; color: var(--navy); }
.kpi-sub   { font-size: 11px; color: var(--muted); margin-top: 4px; }

/* ── SECTION HEADING ── */
.section-heading {
  font-size: 11px; font-weight: 700; letter-spacing: .18em; text-transform: uppercase;
  color: var(--muted); padding: 0 0 10px; margin: 24px 0 14px;
  border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 8px;
}
.section-heading::before { content:''; display:block; width:3px; height:14px; border-radius:2px; background: var(--blue); }

/* ── TABLE ── */
.table-wrap { background: var(--white); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
thead th {
  background: var(--navy); color: rgba(255,255,255,0.85);
  padding: 11px 14px; text-align: left;
  font-size: 10px; font-weight: 700; letter-spacing: .12em; text-transform: uppercase;
  white-space: nowrap;
}
tbody tr { border-bottom: 1px solid var(--border); transition: background .15s; }
tbody tr:last-child { border-bottom: none; }
tbody tr:hover { background: #F8FAFC; }
tbody td { padding: 11px 14px; color: var(--text); }
.td-num { font-family: 'DM Sans', sans-serif; font-weight: 700; font-variant-numeric: tabular-nums; }
.semaforo { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; }
.sem-green { background: var(--success); }
.sem-yellow { background: #F59E0B; }
.sem-red { background: var(--red); }

/* ── RESPONSIVE ── */
@media (max-width: 768px) {
  .header { padding: 12px 16px; }
  .header img { height: 34px; }
  .header-title strong { font-size: 13px; }
  .main { padding: 20px 14px 40px; }
  .kpi-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
  .kpi-value { font-size: 26px; }
  .tabs-wrap { padding: 0 12px; }
  .tab-btn { padding: 12px 14px; font-size: 12px; }
  table { font-size: 12px; }
  thead th, tbody td { padding: 9px 10px; }
}
@media (max-width: 480px) {
  .header { flex-direction: column; align-items: flex-start; gap: 8px; }
  .header-title { text-align: left; }
  .kpi-grid { grid-template-columns: 1fr 1fr; }
  .result-card { flex-direction: column; align-items: flex-start; gap: 12px; }
  .score-circle { width: 52px; height: 52px; }
  .score-pct { font-size: 13px; }
  /* Hide less critical table cols on mobile */
  .hide-mobile { display: none; }
}
</style>
</head>

  }

  container.innerHTML = results.map(d => {
    const cls    = d.aprobado ? 'pass' : 'fail';
    const estado = d.aprobado ? 'Aprobado' : 'Reprobado';
    const turnoCls = d.turno === 'A' ? 'chip-turn-a' : d.turno === 'B' ? 'chip-turn-b' : 'chip-turn-na';
    const turnoLabel = d.turno === 'NA' ? 'Sin Turno' : 'Turno ' + d.turno;
    return [
      '<div class="result-card">',
      '  <div class="score-circle ' + cls + '">',
      '    <span class="score-pct">' + pct(d.rendimiento) + '</span>',
      '    <span class="score-pts">' + d.puntuacion + '</span>',
      '  </div>',
      '  <div class="result-info">',
      '    <div class="result-name">' + d.colaborador + '</div>',
      '    <div class="result-meta">',
      '      <span class="chip chip-rol">' + d.rol + '</span>',
      '      <span class="chip chip-suc">' + d.sucursal + '</span>',
      '      <span class="chip ' + turnoCls + '">' + turnoLabel + '</span>',
      '      <span class="chip chip-' + cls + '">' + estado + '</span>',
      '    </div>',
      '    <div class="prog-bar-wrap"><div class="prog-bar ' + cls + '" style="width:' + pct(d.rendimiento) + '"></div></div>',
      '  </div>',
      '</div>'
    ].join('\n');
  }).join('');
}

/* ── KPIs GENERAL ── */
function buildGeneral() {
  const total    = DATA.length;
  const aprobados= DATA.filter(d=>d.aprobado).length;
  const rendProm = avg(DATA.map(d=>d.rendimiento));
  const sucursales = [...new Set(DATA.map(d=>d.sucursal))].length;

  const cards = [
    { label:'Total Evaluados',     value: total,               sub:'Semana 01',            cls:'' },
    { label:'Aprobados',           value: aprobados,           sub: total-aprobados+' reprobados', cls:'green' },
    { label:'% Aprobación Global', value: pct(aprobados/total),sub:'Del total evaluado',   cls:'navy' },
    { label:'Rendimiento Promedio',value: pct(rendProm),        sub:'Nota promedio',        cls:'blue' },
    { label:'Sucursales',          value: sucursales,           sub:'Activas esta semana',  cls:'' },
  ];

  document.getElementById('kpi-general').innerHTML = cards.map(c =>
    '<div class="kpi-card ' + c.cls + '">' +
    '<div class="kpi-label">' + c.label + '</div>' +
    '<div class="kpi-value">' + c.value + '</div>' +
    '<div class="kpi-sub">' + c.sub + '</div>' +
    '</div>'
  ).join('');
}

/* ── KPIs POR SUCURSAL ── */
function buildSucursal() {
  const map = {};
  DATA.forEach(d => {
    if (!map[d.sucursal]) map[d.sucursal] = [];
    map[d.sucursal].push(d);
  });
  const rows = Object.entries(map).sort((a,b)=>a[0].localeCompare(b[0]));
  document.getElementById('tbody-sucursal').innerHTML = rows.map(([suc, items]) => {
    const aprobados = items.filter(d=>d.aprobado).length;
    const rend = avg(items.map(d=>d.rendimiento));
    const aprobPct = aprobados / items.length;
    return '<tr>' +
      '<td><strong>' + suc + '</strong></td>' +
      '<td class="td-num">' + items.length + '</td>' +
      '<td class="td-num">' + aprobados + '</td>' +
      '<td class="td-num hide-mobile">' + (items.length - aprobados) + '</td>' +
      '<td class="td-num">' + semaforo(aprobPct) + pct(aprobPct) + '</td>' +
      '<td class="td-num">' + semaforo(rend) + pct(rend) + '</td>' +
      '</tr>';
  }).join('');
}

/* ── KPIs POR TURNO-SUCURSAL ── */
function buildTurnoSucursal() {
  const map = {};
  DATA.filter(d => d.turno !== 'NA').forEach(d => {
    const key = d.turno + '||' + d.sucursal;
    if (!map[key]) map[key] = [];
    map[key].push(d);
  });
  const rows = Object.entries(map).sort((a,b)=>a[0].localeCompare(b[0]));
  document.getElementById('tbody-turno').innerHTML = rows.map(([key, items]) => {
    const [turno, suc] = key.split('||');
    const aprobados = items.filter(d=>d.aprobado).length;
    const rend = avg(items.map(d=>d.rendimiento));
    const aprobPct = aprobados / items.length;
    const turnoCls = turno === 'A' ? 'color:var(--blue);font-weight:700' : 'color:var(--red);font-weight:700';
    return '<tr>' +
      '<td><span style="' + turnoCls + '">Turno ' + turno + '</span></td>' +
      '<td>' + suc + '</td>' +
      '<td class="td-num">' + items.length + '</td>' +
      '<td class="td-num hide-mobile">' + aprobados + '</td>' +
      '<td class="td-num">' + semaforo(aprobPct) + pct(aprobPct) + '</td>' +
      '<td class="td-num">' + semaforo(rend) + pct(rend) + '</td>' +
      '</tr>';
  }).join('');
}

/* ── INIT ── */
buildGeneral();
buildSucursal();
buildTurnoSucursal();
renderSearch(); // show placeholder state
</script>
